services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dayboard}
      POSTGRES_USER: ${POSTGRES_USER:-dayboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dayboard}
    ports:
      - "5432:5432"
    volumes:
      - dayboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dayboard} -d ${POSTGRES_DB:-dayboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - dayboard_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dayboard_postgres_data:
  dayboard_redis_data:
