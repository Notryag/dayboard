name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/ci.yml"
      - "docker-compose.yml"
  pull_request:
    paths:
      - "apps/**"
      - ".github/workflows/ci.yml"
      - "docker-compose.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: dayboard_test
          POSTGRES_PASSWORD: dayboard
          POSTGRES_USER: dayboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dayboard -d dayboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://dayboard:dayboard@localhost:5432/dayboard_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run alembic upgrade head
      - run: uv run pytest -q
      - run: uv run python scripts/export_openapi.py openapi.json
      - uses: actions/upload-artifact@v6
        with:
          name: dayboard-openapi
          path: apps/api/openapi.json
          retention-days: 1

  web-quality:
    needs: api-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v7
        with:
          name: dayboard-openapi
          path: /tmp/dayboard-openapi
      - run: npm run api:types:check
        env:
          OPENAPI_URL: /tmp/dayboard-openapi/openapi.json
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
