name: Build and deploy

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: dayboard-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/notryag/dayboard-api
  WEB_IMAGE: ghcr.io/notryag/dayboard-web

jobs:
  api-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: dayboard_test
          POSTGRES_PASSWORD: dayboard
          POSTGRES_USER: dayboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dayboard -d dayboard_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://dayboard:dayboard@localhost:5432/dayboard_test
      TEST_DATABASE_URL: postgresql+asyncpg://dayboard:dayboard@localhost:5432/dayboard_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python ../../tools/check_architecture.py
      - run: uv run ruff check ../../packages/agent-platform ../../tools/check_architecture.py
      - run: uv run ruff check .
      - run: uv run alembic upgrade head
      - run: uv run pytest -q ../../packages/agent-platform/tests
      - run: uv run pytest -q
      - run: uv run python scripts/export_openapi.py openapi.json
      - uses: actions/upload-artifact@v6
        with:
          name: dayboard-openapi
          path: apps/api/openapi.json
          retention-days: 1

  web-quality:
    needs: api-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - uses: actions/download-artifact@v7
        with:
          name: dayboard-openapi
          path: /tmp/dayboard-openapi
      - run: npm run api:types:check
        env:
          OPENAPI_URL: /tmp/dayboard-openapi/openapi.json
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  images:
    needs: [api-quality, web-quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/notryag/dayboard-api
            dockerfile: apps/api/Dockerfile
          - name: web
            image: ghcr.io/notryag/dayboard-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/dayboard_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/dayboard_deploy ~/.ssh/known_hosts
      - name: Authenticate server to GHCR
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh \
            -i ~/.ssh/dayboard_deploy \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io --username '${{ github.actor }}' --password-stdin"
      - name: Deploy commit
        env:
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/dayboard_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /home/zx/dayboard && \
             git fetch --tags origin && \
             test \"\$(git rev-list -n 1 '$RELEASE_TAG')\" = '$COMMIT_SHA' && \
             git diff --quiet && \
             git diff --cached --quiet && \
             git checkout --detach '$COMMIT_SHA' && \
             test \"\$(git rev-parse HEAD)\" = '$COMMIT_SHA' && \
             ./deploy/scripts/deploy-images.sh '$COMMIT_SHA'"
