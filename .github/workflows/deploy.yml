name: Build and deploy

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: dayboard-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/notryag/dayboard-api
  WEB_IMAGE: ghcr.io/notryag/dayboard-web

jobs:
  api-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run pytest -q tests/test_config.py

  web-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  images:
    needs: [api-quality, web-quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/notryag/dayboard-api
            dockerfile: apps/api/Dockerfile
          - name: web
            image: ghcr.io/notryag/dayboard-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.sha }}
            ${{ matrix.image }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: images
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure SSH
        env:
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/dayboard_deploy
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/dayboard_deploy ~/.ssh/known_hosts
      - name: Authenticate server to GHCR
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh \
            -i ~/.ssh/dayboard_deploy \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io --username '${{ github.actor }}' --password-stdin"
      - name: Deploy commit
        env:
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          ssh -i ~/.ssh/dayboard_deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /home/zx/dayboard && \
             git pull --ff-only origin main && \
             git fetch --tags origin && \
             test \"\$(git rev-list -n 1 '$RELEASE_TAG')\" = '$COMMIT_SHA' && \
             test \"\$(git rev-parse HEAD)\" = '$COMMIT_SHA' && \
             ./deploy/scripts/deploy-images.sh '$COMMIT_SHA'"
